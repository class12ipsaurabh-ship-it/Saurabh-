<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Will You Be My Girlfriend? 💖</title>

<!-- Romantic + clean fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ============ RESET & BASE ============ */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  :root{
    --pink-soft:#FFD1DC;
    --pink-mid:#FFB6C9;
    --pink-bright:#FF6FA5;
    --pink-deep:#E84393;
    --rose-dark:#C2647A;
    --rose-darker:#A85268;
    --white:#FFFFFF;
  }

  html, body{
    height:100%;
    overflow:hidden;
    font-family:'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffe4ec 0%, #ffd1dc 35%, #ffc2d6 60%, #ffb3cf 100%);
    background-size: 200% 200%;
    animation: gradientShift 12s ease-in-out infinite;
  }

  @keyframes gradientShift{
    0%{ background-position:0% 50%; }
    50%{ background-position:100% 50%; }
    100%{ background-position:0% 50%; }
  }

  /* ============ BACKGROUND LAYERS ============ */
  #bg-blobs{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    transition: transform 0.3s ease-out;
  }
  .blob{
    position:absolute; border-radius:50%;
    filter: blur(60px);
    opacity:0.5;
  }
  .blob1{ width:340px; height:340px; background:var(--pink-bright); top:-80px; left:-80px; }
  .blob2{ width:420px; height:420px; background:var(--pink-mid); bottom:-120px; right:-100px; }
  .blob3{ width:260px; height:260px; background:#fff0f5; top:40%; left:60%; }

  #hearts-container, #sparkles-container{
    position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden;
  }

  .floating-heart{
    position:absolute;
    bottom:-60px;
    color: rgba(255,255,255,0.85);
    user-select:none;
    will-change: transform, opacity;
    filter: drop-shadow(0 0 6px rgba(255,182,201,0.7));
  }

  .sparkle{
    position:absolute;
    width:4px; height:4px;
    background:#fff;
    border-radius:50%;
    box-shadow:0 0 8px 2px rgba(255,255,255,0.9);
    animation: twinkle 2.5s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{ opacity:0; transform:scale(0.5); }
    50%{ opacity:1; transform:scale(1.3); }
  }

  /* ============ SCREENS ============ */
  .screen{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    z-index:5;
    padding:20px;
  }
  #no-screen-yet{}

  .hidden{ display:none !important; }

  .fade-out{
    animation: fadeOutScreen 0.6s ease forwards;
  }
  .fade-in{
    animation: fadeInScreen 0.7s ease forwards;
  }
  @keyframes fadeOutScreen{
    from{ opacity:1; transform:scale(1); }
    to{ opacity:0; transform:scale(0.92); pointer-events:none; }
  }
  @keyframes fadeInScreen{
    from{ opacity:0; transform:scale(0.9); }
    to{ opacity:1; transform:scale(1); }
  }

  /* ============ GLASS CARD ============ */
  .glass-card{
    position:relative;
    width:100%;
    max-width:460px;
    background: rgba(255,255,255,0.28);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border-radius:32px;
    border:1px solid rgba(255,255,255,0.5);
    box-shadow: 0 8px 40px rgba(232,67,147,0.25), inset 0 0 40px rgba(255,255,255,0.25);
    padding:48px 32px 40px;
    text-align:center;
    overflow:visible;
    animation: cardEntrance 1s cubic-bezier(.2,.9,.3,1.2) both;
    min-height: 420px;
  }

  @keyframes cardEntrance{
    0%{ opacity:0; transform: translateY(60px) scale(0.85); }
    60%{ opacity:1; }
    100%{ opacity:1; transform: translateY(0) scale(1); }
  }

  .heading{
    font-family:'Dancing Script', cursive;
    font-weight:700;
    font-size:clamp(2.1rem, 6vw, 3rem);
    color: var(--pink-deep);
    text-shadow: 0 2px 12px rgba(255,255,255,0.6);
    line-height:1.25;
    margin-bottom:10px;
    animation: pulseHeart 2.4s ease-in-out infinite;
  }
  @keyframes pulseHeart{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.045); }
  }

  .subtext{
    font-size:0.95rem;
    color:#8a4a5c;
    margin-bottom:34px;
    font-weight:500;
    opacity:0.85;
  }

  /* ============ BUTTONS ============ */
  .btn-row{
    position:relative;
    display:flex;
    gap:18px;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    min-height:130px;
  }

  .btn{
    border:none;
    outline:none;
    cursor:pointer;
    font-family:'Poppins', sans-serif;
    font-weight:600;
    font-size:1.05rem;
    padding:16px 34px;
    border-radius:50px;
    transition: transform 0.15s ease, box-shadow 0.25s ease, left 0.35s cubic-bezier(.2,.8,.3,1.4), top 0.35s cubic-bezier(.2,.8,.3,1.4);
    -webkit-tap-highlight-color: transparent;
  }

  #yes-btn{
    background: linear-gradient(135deg, #ff8fbf, var(--pink-bright));
    color:#fff;
    box-shadow: 0 8px 24px rgba(255,111,165,0.55);
  }
  #yes-btn:hover{
    transform: translateY(-4px) scale(1.06);
    box-shadow: 0 14px 32px rgba(255,111,165,0.7);
  }
  #yes-btn:active{ transform: scale(0.96); }

  #no-btn{
    background: linear-gradient(135deg, var(--rose-dark), var(--rose-darker));
    color:#fff;
    box-shadow: 0 6px 18px rgba(162,82,104,0.45);
  }
  #no-btn.escaping{
    position:absolute;
  }

  /* glow pulse on yes button */
  @keyframes glowPulse{
    0%,100%{ box-shadow:0 8px 24px rgba(255,111,165,0.55); }
    50%{ box-shadow:0 8px 34px rgba(255,111,165,0.9); }
  }
  #yes-btn{ animation: glowPulse 2s ease-in-out infinite; }

  /* ============ CELEBRATION SCREEN ============ */
  #celebration{
    flex-direction:column;
  }

  #burst-container{
    position:fixed; inset:0; pointer-events:none; z-index:6;
  }

  .burst-heart{
    position:absolute;
    left:50%; top:50%;
    color:var(--pink-bright);
    will-change: transform, opacity;
  }

  .confetti-piece{
    position:absolute;
    top:-20px;
    will-change: transform, opacity;
  }

  .prank-card{
    text-align:center;
    opacity:0;
    animation: prankReveal 0.8s ease 0.15s forwards;
  }
  @keyframes prankReveal{
    0%{ opacity:0; transform: scale(0.5) rotate(-8deg); }
    60%{ opacity:1; transform: scale(1.1) rotate(3deg); }
    100%{ opacity:1; transform: scale(1) rotate(0deg); }
  }

  .prank-title{
    font-family:'Dancing Script', cursive;
    font-weight:700;
    font-size:clamp(2.4rem, 8vw, 3.6rem);
    color:var(--pink-deep);
    text-shadow: 0 4px 20px rgba(255,255,255,0.7);
    margin-bottom:14px;
  }

  .prank-sub{
    font-size:1.05rem;
    color:#8a4a5c;
    font-weight:500;
    margin-bottom:32px;
  }

  #restart-btn{
    background: linear-gradient(135deg, #ff8fbf, var(--pink-bright));
    color:#fff;
    border:none;
    padding:15px 36px;
    border-radius:50px;
    font-family:'Poppins', sans-serif;
    font-weight:600;
    font-size:1rem;
    cursor:pointer;
    box-shadow: 0 8px 24px rgba(255,111,165,0.55);
    transition: transform 0.2s ease;
  }
  #restart-btn:hover{ transform: translateY(-3px) scale(1.05); }
  #restart-btn:active{ transform: scale(0.95); }

  /* ============ MUSIC TOGGLE ============ */
  #music-toggle{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:20;
    width:52px; height:52px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(10px);
    display:flex; align-items:center; justify-content:center;
    font-size:1.3rem;
    cursor:pointer;
    box-shadow: 0 6px 18px rgba(232,67,147,0.3);
    transition: transform 0.2s ease;
  }
  #music-toggle:hover{ transform: scale(1.08); }
  #music-toggle:active{ transform: scale(0.92); }

  /* ============ RESPONSIVE ============ */
  @media (max-width:480px){
    .glass-card{ padding:38px 22px 32px; border-radius:26px; }
    .btn{ padding:14px 26px; font-size:0.98rem; }
    .btn-row{ gap:14px; }
  }

  @media (max-height:640px){
    .glass-card{ min-height:auto; padding:30px 24px; }
  }
</style>
</head>
<body>

<!-- Dreamy background blobs (parallax) -->
<div id="bg-blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<!-- Floating hearts + sparkles -->
<div id="hearts-container"></div>
<div id="sparkles-container"></div>

<!-- Music toggle -->
<button id="music-toggle" title="Toggle music">🔈</button>

<!-- ============ LANDING SCREEN ============ -->
<div class="screen" id="landing">
  <div class="glass-card" id="landing-card">
    <h1 class="heading">💖 Will you be my girlfriend? 💖</h1>
    <p class="subtext">Choose wisely... one of these buttons is a little shy 🙈</p>
    <div class="btn-row" id="btn-row">
      <button class="btn" id="yes-btn">💗 YES</button>
      <button class="btn" id="no-btn">💔 NO</button>
    </div>
  </div>
</div>

<!-- ============ CELEBRATION / PRANK SCREEN ============ -->
<div class="screen hidden" id="celebration">
  <div class="glass-card prank-card" id="prank-card">
    <h1 class="prank-title">😂 HAHA... PRANK! 😂</h1>
    <p class="prank-sub">Thanks for pressing YES 😆❤️</p>
    <button id="restart-btn">Start Again 🔄</button>
  </div>
</div>

<div id="burst-container"></div>

<script>
/* =========================================================
   WILL YOU BE MY GIRLFRIEND? — single-file interactive page
   Sections: background fx, dodge-button game, celebration fx,
   generative background music, screen transitions.
========================================================= */

/* ---------- Utility ---------- */
const rand = (min, max) => Math.random() * (max - min) + min;
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

/* =========================================================
   1. FLOATING HEARTS BACKGROUND
========================================================= */
const heartsContainer = document.getElementById('hearts-container');
const heartGlyphs = ['❤','💕','💗','💖','💓'];

function spawnFloatingHeart(){
  const heart = document.createElement('span');
  heart.className = 'floating-heart';
  heart.textContent = heartGlyphs[Math.floor(rand(0, heartGlyphs.length))];

  const size = rand(14, 40);
  const left = rand(0, 100);
  const duration = rand(7, 16);
  const drift = rand(-60, 60);
  const rotate = rand(-40, 40);

  heart.style.left = left + 'vw';
  heart.style.fontSize = size + 'px';
  heart.style.opacity = rand(0.35, 0.9);

  heartsContainer.appendChild(heart);

  const anim = heart.animate([
    { transform: translate(0,0) rotate(0deg), offset:0 },
    { transform: translate(${drift}px, -110vh) rotate(${rotate}deg), offset:1 }
  ], {
    duration: duration * 1000,
    easing: 'linear'
  });

  anim.onfinish = () => heart.remove();
}

// spawn hearts continuously
setInterval(spawnFloatingHeart, 450);
for(let i=0;i<10;i++) setTimeout(spawnFloatingHeart, i*200); // initial burst fill

/* =========================================================
   2. SPARKLES
========================================================= */
const sparklesContainer = document.getElementById('sparkles-container');
function spawnSparkle(){
  const sp = document.createElement('div');
  sp.className = 'sparkle';
  sp.style.left = rand(0,100) + 'vw';
  sp.style.top = rand(0,100) + 'vh';
  sp.style.animationDuration = rand(1.6, 3.2) + 's';
  sparklesContainer.appendChild(sp);
  setTimeout(()=> sp.remove(), 3300);
}
setInterval(spawnSparkle, 300);

/* =========================================================
   3. PARALLAX BACKGROUND BLOBS
========================================================= */
const bgBlobs = document.getElementById('bg-blobs');
document.addEventListener('mousemove', (e)=>{
  const x = (e.clientX / window.innerWidth - 0.5) * 30;
  const y = (e.clientY / window.innerHeight - 0.5) * 30;
  bgBlobs.style.transform = translate(${x}px, ${y}px);
});

/* =========================================================
   4. THE DODGING "NO" BUTTON GAME
========================================================= */
const landingCard = document.getElementById('landing-card');
const btnRow = document.getElementById('btn-row');
const noBtn = document.getElementById('no-btn');
const yesBtn = document.getElementById('yes-btn');

let dodgeCount = 0;
let dodgeSpeed = 0.35; // seconds, gets faster (lower) each dodge
let isEscaping = false;

function getSafeBounds(){
  const cardRect = landingCard.getBoundingClientRect();
  const btnRect = noBtn.getBoundingClientRect();
  const padding = 16;
  const maxX = cardRect.width - btnRect.width - padding;
  const maxY = cardRect.height - btnRect.height - padding;
  return { maxX: Math.max(maxX, 0), maxY: Math.max(maxY, 0), padding };
}

function moveNoButtonRandomly(){
  if(!isEscaping){
    // first time: convert to absolutely-positioned within card
    const cardRect = landingCard.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();
    noBtn.classList.add('escaping');
    noBtn.style.left = (btnRect.left - cardRect.left) + 'px';
    noBtn.style.top = (btnRect.top - cardRect.top) + 'px';
    isEscaping = true;
  }

  const { maxX, maxY, padding } = getSafeBounds();
  const newX = clamp(rand(padding, maxX), 0, maxX);
  const newY = clamp(rand(padding, maxY), 0, maxY);

  noBtn.style.transitionDuration = ${dodgeSpeed}s;
  noBtn.style.left = newX + 'px';
  noBtn.style.top = newY + 'px';

  // slight funny wobble
  noBtn.style.transform = rotate(${rand(-12,12)}deg);
  setTimeout(()=>{ noBtn.style.transform = 'rotate(0deg)'; }, dodgeSpeed10000.6);

  dodgeCount++;
  dodgeSpeed = Math.max(0.12, dodgeSpeed - 0.02); // gets faster, floor at 0.12s
}

// Desktop: move away when cursor gets close
function handlePointerProximity(clientX, clientY){
  const rect = noBtn.getBoundingClientRect();
  const centerX = rect.left + rect.width/2;
  const centerY = rect.top + rect.height/2;
  const dist = Math.hypot(clientX - centerX, clientY - centerY);
  const threshold = 90;
  if(dist < threshold){
    moveNoButtonRandomly();
  }
}

document.addEventListener('mousemove', (e)=>{
  handlePointerProximity(e.clientX, e.clientY);
});

// Mobile: dodge on touchmove (before tap lands) and on touchstart
document.addEventListener('touchmove', (e)=>{
  const touch = e.touches[0];
  if(touch) handlePointerProximity(touch.clientX, touch.clientY);
}, { passive:true });

noBtn.addEventListener('touchstart', (e)=>{
  e.preventDefault();
  moveNoButtonRandomly();
}, { passive:false });

// Also dodge on hover directly (covers fast mouse jumps) & click just in case
noBtn.addEventListener('mouseenter', moveNoButtonRandomly);
noBtn.addEventListener('click', (e)=>{
  e.preventDefault();
  moveNoButtonRandomly();
});

/* =========================================================
   5. YES BUTTON -> CELEBRATION + PRANK REVEAL
========================================================= */
const landingScreen = document.getElementById('landing');
const celebration = document.getElementById('celebration');
const burstContainer = document.getElementById('burst-container');
const prankCard = document.getElementById('prank-card');
const restartBtn = document.getElementById('restart-btn');

yesBtn.addEventListener('click', ()=>{
  startMusicIfNeeded();
  triggerCelebration();
});

function triggerCelebration(){
  // fade out landing
  landingScreen.classList.add('fade-out');

  setTimeout(()=>{
    landingScreen.classList.add('hidden');
    landingScreen.classList.remove('fade-out');
    celebration.classList.remove('hidden');
    celebration.classList.add('fade-in');

    // hide prank text initially (css animation handles delayed reveal)
    prankCard.style.animation = 'none';
    void prankCard.offsetWidth; // reflow to restart animation
    prankCard.style.animation = '';

    launchHeartBurst();
    launchConfetti();
  }, 600);
}

/* ----- Heart burst explosion ----- */
function launchHeartBurst(){
  const count = 26;
  for(let i=0;i<count;i++){
    const h = document.createElement('div');
    h.className = 'burst-heart';
    h.textContent = heartGlyphs[Math.floor(rand(0,heartGlyphs.length))];
    h.style.fontSize = rand(20,42) + 'px';
    burstContainer.appendChild(h);

    const angle = rand(0, Math.PI*2);
    const distance = rand(120, 340);
    const x = Math.cos(angle)*distance;
    const y = Math.sin(angle)*distance;

    const anim = h.animate([
      { transform:'translate(-50%,-50%) scale(0.3)', opacity:0 },
      { transform:translate(calc(-50% + ${x*0.3}px), calc(-50% + ${y*0.3}px)) scale(1.2), opacity:1, offset:0.3 },
      { transform:translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(0.6), opacity:0 }
    ], { duration: rand(1200,1800), easing:'cubic-bezier(.2,.8,.3,1)' });

    anim.onfinish = ()=> h.remove();
  }
}

/* ----- Confetti ----- */
const confettiColors = ['#FF6FA5','#FFD1DC','#FFFFFF','#FFB6C9','#E84393','#FFF0F5'];
function launchConfetti(){
  const count = 60;
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      const size = rand(6,12);
      c.style.width = size + 'px';
      c.style.height = size*rand(0.4,1) + 'px';
      c.style.background = confettiColors[Math.floor(rand(0,confettiColors.length))];
      c.style.left = rand(0,100) + 'vw';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      burstContainer.appendChild(c);

      const fallX = rand(-80,80);
      const rotate = rand(180,720) * (Math.random()>0.5?1:-1);
      const duration = rand(2200, 3600);

      const anim = c.animate([
        { transform:translate(0,0) rotate(0deg), opacity:1 },
        { transform:translate(${fallX}px, 100vh) rotate(${rotate}deg), opacity:0.9 }
      ], { duration, easing:'cubic-bezier(.3,.6,.4,1)' });

      anim.onfinish = ()=> c.remove();
    }, i*20);
  }
}

/* =========================================================
   6. RESTART
========================================================= */
restartBtn.addEventListener('click', ()=>{
  celebration.classList.add('fade-out');
  setTimeout(()=>{
    celebration.classList.add('hidden');
    celebration.classList.remove('fade-out','fade-in');

    // reset NO button position/state
    noBtn.classList.remove('escaping');
    noBtn.style.left = '';
    noBtn.style.top = '';
    noBtn.style.transform = '';
    dodgeCount = 0;
    dodgeSpeed = 0.35;
    isEscaping = false;

    landingScreen.classList.remove('hidden');
    landingScreen.classList.add('fade-in');
    setTimeout(()=> landingScreen.classList.remove('fade-in'), 700);
  }, 600);
});

/* =========================================================
   7. GENERATIVE BACKGROUND MUSIC (Web Audio API)
   A gentle, self-contained ambient romantic loop — no external
   audio files needed, satisfies autoplay policy by only starting
   after first user interaction.
========================================================= */
let audioCtx = null;
let musicPlaying = false;
let musicEnabled = true;
let melodyTimer = null;
const musicToggle = document.getElementById('music-toggle');

// gentle pentatonic scale (romantic, soft)
const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25]; // C D E G A C

function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // master gain (soft volume)
  window._masterGain = audioCtx.createGain();
  window._masterGain.gain.value = 0.05;
  window._masterGain.connect(audioCtx.destination);
}

function playNote(freq, time, dur){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;

  gain.gain.setValueAtTime(0, time);
  gain.gain.linearRampToValueAtTime(0.6, time + 0.15);
  gain.gain.exponentialRampToValueAtTime(0.001, time + dur);

  osc.connect(gain);
  gain.connect(w
